          "@type": "Answer",

      {
        "@type": "Question",

      {
        "@type": "Question",
        "name": "What are your gym hours?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We offer classes Monday through Friday starting at 5am, with evening classes until 8pm (Fri until 7pm). Weekend hours are Saturday 7am-1pm and Sunday 9am-12pm. 24-hour access is available for members."
        }
      },
      {
        "@type": "Question",
        "name": "Do you offer personal training?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes, we offer one-on-one personal training with our certified trainers for personalized coaching, custom programming, nutrition guidance, and accelerated results tailored to your specific goals."
        }
      },
      {
        "@type": "Question",
        "name": "What's the difference between HIIT and CrossFit?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "HIIT (High-Intensity Interval Training) focuses on short, intense cardio intervals. CrossFit combines functional movements with varied workouts including strength training, gymnastics, and conditioning for total fitness that prepares you for any physical challenge."
        }
      },
      {
        "@type": "Question",
        "name": "How much does CrossFit membership cost?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "We offer flexible membership options starting at $149/month for 2 classes per week, up to $249/month for unlimited classes. All memberships are month-to-month with no long-term commitment required. Free trials are available."
        }
      },
      {
        "@type": "Question",
        "name": "What is HYROX training?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "HYROX is the world series of fitness racing, combining running with functional fitness exercises. At CrossFit Southie, our HYROX program prepares athletes for competition with high-volume cardio and functional strength endurance training."
        }
      },
      {
        "@type": "Question",
        "name": "Where is CrossFit Southie located?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "CrossFit Southie is located at 383 Dorchester Ave Front, Boston, MA 02127 in South Boston (Southie). We have two large shared parking lots available. Our 10,000 sq ft facility is easily accessible from all of Greater Boston."
        }
      },
      {
        "@type": "Question",
        "name": "Do you offer a free trial class?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Yes! We offer a free trial class for new members. Experience our expert coaching, supportive community, and challenging workouts with no commitment. Sign up online or contact us to schedule your first visit."
        }
      },

        "@type": "Question",
        "name": "What makes CrossFit Southie different from other gyms?",

      },
