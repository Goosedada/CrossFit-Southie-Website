<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1322"/>
      <stop offset="100%" style="stop-color:#141b2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#dc2626;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#dc2626"/>

  <!-- Decorative bars -->
  <rect x="50" y="180" width="8" height="180" fill="#dc2626"/>
  <rect x="1142" y="180" width="8" height="180" fill="#dc2626"/>

  <!-- Main title -->
  <text x="600" y="280" font-family="Arial Black, Arial, sans-serif" font-size="88" font-weight="900" fill="white" text-anchor="middle" letter-spacing="4">CROSSFIT SOUTHIE</text>

  <!-- Subtitle -->
  <text x="600" y="360" font-family="Arial, sans-serif" font-size="28" fill="rgba(255,255,255,0.85)" text-anchor="middle" letter-spacing="8">GROUP FITNESS  •  HIIT  •  STRENGTH TRAINING</text>

  <!-- Divider line -->
  <line x1="400" y1="400" x2="800" y2="400" stroke="#dc2626" stroke-width="2"/>

  <!-- Location -->
  <text x="600" y="470" font-family="Arial Black, Arial, sans-serif" font-size="36" font-weight="bold" fill="#dc2626" text-anchor="middle" letter-spacing="6">SOUTH BOSTON</text>

  <!-- Bottom accent -->
  <rect x="0" y="626" width="1200" height="4" fill="#dc2626"/>

  <!-- Corner accents -->
  <path d="M 30 30 L 80 30 L 30 80 Z" fill="#dc2626" opacity="0.3"/>
  <path d="M 1170 30 L 1120 30 L 1170 80 Z" fill="#dc2626" opacity="0.3"/>
  <path d="M 30 600 L 80 600 L 30 550 Z" fill="#dc2626" opacity="0.3"/>
  <path d="M 1170 600 L 1120 600 L 1170 550 Z" fill="#dc2626" opacity="0.3"/>
</svg>
